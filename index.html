<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Tick Tock</title>

        <!--icons--> 
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

        <!--fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Carter+One&display=swap" rel="stylesheet">

        <style>
            body
            {
                background-color: #212836;
                color: #faf9db;
                font-family: Arial, Helvetica, sans-serif;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
                box-sizing: border-box;
            }

            section
            {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
                align-items: center;
                max-width: 1200px;
                width: 100%;
            }
            
            .header h1
            {
                font-family: Carter One;
                font-size: 3rem;
                justify-self: center;

                margin: 18px;
            }

            .target-box
            {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
                gap: 10px;
                color: #faf9db;
                font-size: 1.1rem;
                margin-top: 10px;
                margin-bottom: 30px;
                padding: 0 10px;
            }
            
            #target-label, #event-label
            {
                color: #fffa65;
                align-items: center;
                font-size: 1.8rem;
                font-weight: bold;
            }

            .time-box
            {
                background: #ffffff10;
                padding: 36px 20px;
                border-radius: 30px;
                text-align: center;
                width: 100px;
                box-sizing: border-box;
            }

            .time-box div
            {
                font-size: 2.5rem;
                font-weight: bold;
                color: #fffa65;
            }

            .time-box span
            {
                font-size: 0.8rem;
                color: #c5c5c5;
                display: block;
                margin: 5px;
            }

            .menu-btn
            {
                background: #c5c5c530;
                border-radius: 12px;
                border: none;
                color: #c5c5c5;
                cursor: pointer;
                padding: 5px;
                display: flex;
                align-items: center;
                justify-content: center;

                position: absolute;
                top: 20px;
                right: 20px;
            }

            .menu-btn.material-icons
            {
                font-size: 1.5rem;
            }

            .sidebar
            {
                position: fixed;
                top: 0px;
                right: 0px;
                width: 280px;
                height: 100vh;

                background-color: #1a1f2a;
                box-shadow: -5px 0 15px #00000075;

                padding: 30px 20px;
                box-sizing: border-box;
                z-index: 1000;

                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open
            {
                transform: translateX(0);
            }

            .close-btn
            {
                background: #c5c5c530;
                border-radius: 12px;
                border: none;
                color: #c5c5c5;
                cursor: pointer;
                padding: 5px;
                
                position: absolute;
                top: 20px;
                right: 20px;
            }

            .close-btn:hover
            {
                color: #ffffff;
            }

            .sidebar h2
            {
                font-size: 1.4rem;
                margin-top: 40px;
                margin-bottom: 20px;
                color: #fffa65;
            }

            .menu-item
            {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .menu-item label
            {
                font-size: 0.9rem;
                color: #c5c5c5;
            }

            #date-input, #title-input
            {
                background: #ffffff10;
                border: 1px solid #ffffff20;
                border-radius: 8px;
                color: #faf9db;
                padding: 10px;
                font-size: 1rem;
                font-family: inherit;
                outline: none;
            }

            .overlay
            {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: #00000070;
                backdrop-filter: blur(5px);
                z-index: 999;

                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .overlay.show
            {
                opacity: 1;
                pointer-events: auto;
            }

            @media (max-width: 600px) 
            {
                section
                {
                    gap: 10px;
                }

                .time-box
                {
                    width: 75px;
                    padding: 20px 10px;
                    border-radius: 15px;
                }

                .time-box div 
                {
                    font-size: 1.6rem;
                }

                .header h1 
                {
                    font-size: 2rem;
                    margin: 10px;
                }

                #target-label
                {
                    font-size: 1.3rem;
                }
            }
        </style>
    </head>
    <body> 
        <header class="header">
            <button class="menu-btn">
                <span class="material-icons">menu</span>
            </button>
            <h1>Tick Tock</h1>
            <div class="target-box">
                <span id="event-label"></span>
                <span>距離</span>
                <span id="target-label"></span>
                <span>還有...</span>
            </div>
        </header>
        <aside class="sidebar" id="sidebar">
            <button class="close-btn" id="close-menu-btn">
                <span class="material-icons">close</span>
            </button>

            <h3>設定</h3>
            <div class="menu-item">
                <label for="date-input">更換目標日期：</label>
                <input type="date" id="date-input">
            </div>
            <div class="menu-item" style="margin-top: 15px;">
                <label for="title-input">修改事件名稱：</label>
                <input type="text" id="title-input" placeholder="新年">
            </div>
        </aside>
        <main>
            <section>
                <div class="time-box"><div id="years">00</div><span>years</span></div>
                <div class="time-box"><div id="months">00</div><span>months</span></div>
                <div class="time-box"><div id="days">00</div><span>days</span></div>
                <div class="time-box"><div id="hours">00</div><span>hours</span></div>
                <div class="time-box"><div id="minutes">00</div><span>minutes</span></div>
                <div class="time-box"><div id="seconds">00</div><span>seconds</span></div>
            </section>
        </main>
        <div class="overlay" id="overlay"></div>
        <script>
            // default
            let targetString="2027-01-01";
            let eventTitle="目標日";
            loadInitialState();

            let targetDate;
            let timerId;

            function loadInitialState()
            {
                const hash=decodeURIComponent(window.location.hash.substring(1));
               
                // 1. url #tag
                if(hash&& /^\d{4}-\d{2}-\d{2}(&.*)?$/.test(hash))
                {
                    const parts=hash.split('&');
                    targetString=parts[0];
                    eventTitle=parts[1]||localStorage.getItem("eventTitle")||"目標";
                    return hash;
                }

                // 2. local storage
                const localDate=localStorage.getItem("targetDate");
                const localTitle=localStorage.getItem("eventTitle");
                if(localDate) targetString=localDate;
                if(localTitle) eventTitle=localTitle;

            }

            function updateTimer()
            {
                const nowTime=new Date().getTime();
                const timeLeft=Math.floor((targetDate-nowTime)/1000);
                
                if (timeLeft<=0)
                {
                    clearInterval(timerId);
                    document.getElementById("years").innerText=0;
                    document.getElementById("months").innerText=0;
                    document.getElementById("days").innerText=0;
                    document.getElementById("hours").innerText=0;
                    document.getElementById("minutes").innerText=0;
                    document.getElementById("seconds").innerText=0;
                    return;

                }
                
                const target=new Date(targetString+"T00:00:00+08:00");
                const now=new Date();
                
                let y=target.getFullYear()-now.getFullYear();
                let mo=target.getMonth()-now.getMonth();
                let d=target.getDate()-now.getDate();
                let h=target.getHours()-now.getHours();
                let m=target.getMinutes()-now.getMinutes();
                let s=target.getSeconds()-now.getSeconds();

                if(s<0){s+=60;m--;}
                if(m<0){m+=60;h--;}
                if(h<0){h+=24;d--} 
                if(d<0)
                {
                    // 將日期設為本月第 0 天，就能拿到上個月的最後一天（即總天數）
                    const daysInPrevMonth=new Date(now.getFullYear(),now.getMonth(),0).getDate();
                    d+=daysInPrevMonth;
                    mo--;
                }
                if(mo<0){mo+=12;y--}

                document.getElementById("years").innerText=y;
                document.getElementById("months").innerText=mo;
                document.getElementById("days").innerText=d;
                document.getElementById("hours").innerText=h;
                document.getElementById("minutes").innerText=m;
                document.getElementById("seconds").innerText=s;

                let hasValue=false;

                if(y>0)
                {
                    hasValue=true;
                    document.getElementById("years").parentElement.style.display="";
                }
                else
                {
                    document.getElementById("years").parentElement.style.display="none";
                }

                if(mo>0||hasValue)
                {
                    hasValue=true;
                    document.getElementById("months").parentElement.style.display="";
                }
                else
                {
                    document.getElementById("months").parentElement.style.display="none";
                }

                if(d>0||hasValue)
                {
                    hasValue=true;
                    document.getElementById("days").parentElement.style.display="";
                }
                else
                {
                    document.getElementById("days").parentElement.style.display="none";
                }

                if(h>0||hasValue)
                {
                    hasValue=true;
                    document.getElementById("hours").parentElement.style.display="";
                }
                else
                {
                    document.getElementById("hours").parentElement.style.display="none";
                }
                
                if(m>0||hasValue)
                {
                    hasValue=true;
                    document.getElementById("minutes").parentElement.style.display="";
                }
                else
                {
                    document.getElementById("minutes").parentElement.style.display="none";
                }

                document.getElementById("seconds").parentElement.style.display="";
            }
            
            function initTimer(newDateString, newTitleString)
            {
                targetString=newDateString;
                if(newTitleString!==undefined) eventTitle=newTitleString;
                
                targetDate=new Date(targetString+"T00:00:00+08:00").getTime();
                
                // 更新畫面
                document.getElementById("target-label").innerText=targetString;
                document.getElementById("date-input").value=targetString;
                document.getElementById("event-label").innerText=eventTitle;
                document.getElementById("title-input").value=eventTitle;

                clearInterval(timerId);
                timerId=setInterval(updateTimer,100);
                updateTimer();
            }
            
            // 事件監聽
            const sidebar=document.getElementById("sidebar");
            const menuBtn=document.querySelector(".menu-btn");
            const closeMenuBtn=document.getElementById("close-menu-btn");
            const dateInput=document.getElementById("date-input");
            const overLay=document.getElementById("overlay");
            const titleInput=document.getElementById("title-input");

            initTimer(targetString, eventTitle);

            menuBtn.addEventListener("click",()=>
            {
                sidebar.classList.add("open");
                overLay.classList.add("show");
            });

            closeMenuBtn.addEventListener("click",()=>
            {
                sidebar.classList.remove("open");
                overLay.classList.remove("show");
            });

            titleInput.addEventListener("change",(e)=>
            {
                const newTitle=e.target.value.trim();
                
                if(newTitle==="")newTitle="目標";

                localStorage.setItem("eventTitle",newTitle);
                window.location.hash=targetString+"&"+encodeURIComponent(newTitle);

                initTimer(targetString, newTitle);
            })

            dateInput.addEventListener("change",(e)=>
            {
                const newDate=e.target.value;
                // 防呆：沒選就跳出
                if(!newDate)return;

                localStorage.setItem("targetDate",newDate);
                window.location.hash=newDate+"&"+encodeURIComponent(eventTitle);

                initTimer(newDate, eventTitle);
            })

            window.addEventListener("hashchange",()=>
            {
                const newHash=encodeURIComponent(window.location.hash.substring(1));
                if(newHash&&/^\d{4}-\d{2}-\d{2}(&.*)?$/.test(newHash))
                {
                    const parts=newHash.split('&');
                    initTimer(parts[0],parts[1]||"目標日");
                }
            })

            overLay.addEventListener("click",()=>
            {
                sidebar.classList.remove("open");
                overLay.classList.remove("show");
            });
        </script>
    </body>
</html>
