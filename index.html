<html>
    <head>
        <title>Tick Tock</title>
    </head>
    <body> 
        <header>
            <h1>Tick Tock</h1>
            <style>
                body
                {
                    background-color: #212836;
                    color: #faf9db;
                    font-family: Arial, Helvetica, sans-serif;

                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                    margin: 0;
                }

                section
                {
                    display: flex;
                    gap: 20px;
                    justify-content: center;
                    align-items: center;
                    margin-top: 20px;
                }

                .time-box
                {
                    background: #ffffff10;
                    padding: 15px 25px;
                    border-radius: 30px;
                    text-align: center;
                    min-width: 80px;
                }

                .time-box div
                {
                    font-size: 2.5rem;
                    font-weight: bold;
                    color: #fffa65;
                }

                .time-box span
                {
                    font-size: 0.8rem;
                    color: #c5c5c5;
                    display: block;
                    margin: 5px;
                }
            </style>
        </header>
        <main>
            <section>
                <div class="time-box"><div id="years">00</div><span>years</span></div>
                <div class="time-box"><div id="months">00</div><span>months</span></div>
                <div class="time-box"><div id="days">00</div><span>days</span></div>
                <div class="time-box"><div id="hours">00</div><span>hours</span></div>
                <div class="time-box"><div id="minutes">00</div><span>minutes</span></div>
                <div class="time-box"><div id="seconds">00</div><span>seconds</span></div>
            </section>
        </main>
        <script>
            const targetDate=new Date("2027-01-01T00:00:00+08:00").getTime();
            
            function updateTimer()
            {
                const nowTime=new Date().getTime();
                const timeLeft=Math.floor((targetDate-nowTime)/1000);
                
                if (timeLeft<=0)
                {
                    clearInterval(timerId);
                    document.getElementById("seconds").innerText=0;
                    return;

                }

                const d=Math.floor(timeLeft/(60*60*24));
                const h=Math.floor((timeLeft%(60*60*24))/(60*60));
                const m=Math.floor((timeLeft%(60*60))/(60));
                const s=(timeLeft%(60));

                document.getElementById("days").innerText=d;
                document.getElementById("hours").innerText=h;
                document.getElementById("minutes").innerText=m;
                document.getElementById("seconds").innerText=s;
            }
            
            const timerId=setInterval(updateTimer,100);
            updateTimer();

        </script>
    </body>
</html>
