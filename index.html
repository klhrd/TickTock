<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Tick Tock</title>

        <!--icons--> 
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

        <!--fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Carter+One&display=swap" rel="stylesheet">

        <!--style-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body> 
        <header class="header">
            <div class="title-label">
                <h1>Tick Tock</h1>
            </div>
            <button class="menu-btn">
                <span class="material-icons">menu</span>
            </button>
            <div id="event-label"></div>
        </header>
        <aside class="sidebar" id="sidebar">
            <button class="close-btn" id="close-menu-btn">
                <span class="material-icons">close</span>
            </button>

            <h3>設定</h3>
            <div class="mode-toggle-container">
                <button id="mode-full" class="mode-btn-item active">完整模式</button>
                <button id="mode-days" class="mode-btn-item">天數模式</button>
            </div>
            <div class="menu-item" style="margin-top: 15px;">
                <label for="date-input">更換目標日期：</label>
                <input type="date" id="date-input">
            </div>
            <div class="menu-item" style="margin-top: 15px;">
                <label for="title-input">修改事件名稱：</label>
                <input type="text" id="title-input" placeholder="新年">
            </div>
        </aside>
        <main>
            <section>
                <div class="time-box"><div id="years">00</div><span>years</span></div>
                <div class="time-box"><div id="months">00</div><span>months</span></div>
                <div class="time-box"><div id="days">00</div><span>days</span></div>
                <div class="time-box"><div id="hours">00</div><span>hours</span></div>
                <div class="time-box"><div id="minutes">00</div><span>minutes</span></div>
                <div class="time-box"><div id="seconds">00</div><span>seconds</span></div>
            </section>
            <div class="overlay" id="overlay"></div>
        </main>
        
        <footer class="footer">
            <div id="target-label"></div>
        </footer>

        <!--script-->
        <script src="script.js"></script>
    </body>
</html>
