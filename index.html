<html>
    <head>
        <title>Tick Tock</title>
        <style>
            body
            {
                background-color: #212836;
                color: #faf9db;
                font-family: Arial, Helvetica, sans-serif;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
                box-sizing: border-box;
            }

            section
            {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                justify-content: center;
                align-items: center;
                max-width: 1800;
            }
            
            .target-box
            {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
                color: #faf9db;
                font-size: 1.1rem;
                margin-top: 10;
                margin-bottom: 30px;
            }
            
            #target-label
            {
                color: #fffa65;
                align-items: center;
                font-size: 1.8rem;
                font-weight: bold;
            }

            .time-box
            {
                background: #ffffff10;
                padding: 36px 20px;
                border-radius: 30px;
                text-align: center;
                width: 100px;
            }

            .time-box div
            {
                font-size: 2.5rem;
                font-weight: bold;
                color: #fffa65;
            }

            .time-box span
            {
                font-size: 0.8rem;
                color: #c5c5c5;
                display: block;
                margin: 5px;
            }
        </style>
    </head>
    <body> 
        <header>
            <h1>Tick Tock</h1>
            <div class="target-box">
                <span>距離</span>
                <span id="target-label"></span>
                <span>還有...</span>
            </div>
        </header>
        <main>
            <section>
                <div class="time-box"><div id="years">00</div><span>years</span></div>
                <div class="time-box"><div id="months">00</div><span>months</span></div>
                <div class="time-box"><div id="days">00</div><span>days</span></div>
                <div class="time-box"><div id="hours">00</div><span>hours</span></div>
                <div class="time-box"><div id="minutes">00</div><span>minutes</span></div>
                <div class="time-box"><div id="seconds">00</div><span>seconds</span></div>
            </section>
        </main>
        <script>
            const targetString="2027-01-01"
            const targetDate=new Date(targetString+"T00:00:00+08:00").getTime();
            
            document.getElementById("target-label").innerText=targetString;

            function updateTimer()
            {
                const nowTime=new Date().getTime();
                const timeLeft=Math.floor((targetDate-nowTime)/1000);
                
                if (timeLeft<=0)
                {
                    clearInterval(timerId);
                    document.getElementById("seconds").innerText=0;
                    return;

                }

                const d=Math.floor(timeLeft/(60*60*24));
                const h=Math.floor((timeLeft%(60*60*24))/(60*60));
                const m=Math.floor((timeLeft%(60*60))/(60));
                const s=(timeLeft%(60));

                document.getElementById("days").innerText=d;
                document.getElementById("hours").innerText=h;
                document.getElementById("minutes").innerText=m;
                document.getElementById("seconds").innerText=s;
            }
            
            const timerId=setInterval(updateTimer,100);
            updateTimer();

        </script>
    </body>
</html>
